<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>我的社群牆</title>
    <style>
        .post { border: 1px solid #ccc; padding: 10px; margin: 10px; border-radius: 8px; position: relative; }
        .delete-btn { color: red; cursor: pointer; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

    <h1>📝 我的社群動態牆</h1>
    <div>
        <textarea id="postInput" placeholder="寫點什麼吧..."></textarea>
        <button id="postBtn">發佈貼文</button>
    </div>
    <hr>
    <div id="memoList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnF-e8BYtHKkqMGKLPL6-tCzh9SZHwGIE",
            authDomain: "my-social-app-74cb5.firebaseapp.com",
            projectId: "my-social-app-74cb5",
            storageBucket: "my-social-app-74cb5.firebasestorage.app",
            messagingSenderId: "296934453383",
            appId: "1:296934453383:web:c5135ba3c923e20c788822",
            measurementId: "G-0VCRMP00CS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 發佈貼文功能
        document.getElementById("postBtn").addEventListener("click", async () => {
            const text = document.getElementById("postInput").value;
            if (!text.trim()) return alert("請輸入內容！");
            try {
                await addDoc(collection(db, "memos"), { content: text, timestamp: new Date() });
                document.getElementById("postInput").value = "";
                loadMemos(); // 重新讀取列表
            } catch (e) {
                alert("發佈失敗，請檢查權限");
            }
        });

        // 讀取並渲染貼文
        async function loadMemos() {
            const memoList = document.getElementById("memoList");
            const q = query(collection(db, "memos"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);

            memoList.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const div = document.createElement("div");
                div.className = "post";
                div.innerHTML = `<p>${data.content}</p>
                                 <small>${data.timestamp?.toDate().toLocaleString() || '剛剛'}</small>
                                 <span class="delete-btn" data-id="${docSnap.id}">刪除</span>`;
                memoList.appendChild(div);
            });

            // 綁定刪除事件
            document.querySelectorAll(".delete-btn").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const id = e.target.getAttribute("data-id");
                    await deleteDoc(doc(db, "memos", id));
                    loadMemos(); 
                });
            });
        }

        loadMemos();
    </script>
</body>
</html>
