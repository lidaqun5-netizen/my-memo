<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>大家都在看 - 即時動態牆</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #fafafa; }
        .post { background: #fff; border: 1px solid #dbdbdb; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .time { color: #8e8e8e; font-size: 12px; }
        .actions { margin-top: 10px; display: flex; gap: 15px; align-items: center; }
        .like-btn { cursor: pointer; color: #ed4956; font-weight: bold; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; padding: 10px; border: 1px solid #dbdbdb; border-radius: 8px; }
        button { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔥 大家都在看</h1>
    <textarea id="postInput" placeholder="分享你的心情..."></textarea>
    <button id="postBtn">發佈</button>
    <div id="memoList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, increment, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = { /* (保持你原有的 firebaseConfig 不變) */ };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 發文功能
        document.getElementById("postBtn").addEventListener("click", async () => {
            const text = document.getElementById("postInput").value;
            if (!text) return;
            await addDoc(collection(db, "memos"), { content: text, timestamp: new Date(), likes: 0 });
            document.getElementById("postInput").value = "";
        });

        // 即時監聽貼文 (onSnapshot)
        const q = query(collection(db, "memos"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById("memoList");
            list.innerHTML = "";
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const time = data.timestamp?.toDate().toLocaleString();
                const div = document.createElement("div");
                div.className = "post";
                div.innerHTML = `
                    <p>${data.content}</p>
                    <div class="time">${time}</div>
                    <div class="actions">
                        <span class="like-btn" onclick="likePost('${docSnap.id}')">❤️ ${data.likes || 0}</span>
                    </div>
                `;
                list.appendChild(div);
            });
        });

        window.likePost = async (id) => {
            await updateDoc(doc(db, "memos", id), { likes: increment(1) });
        };
    </script>
</body>
</html>
