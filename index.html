<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>我的社群牆</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f0f2f5; }
        .post { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .login-box { text-align: center; margin-top: 50px; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: none; background: #0095f6; color: white; margin-top: 5px; }
        .liked { background-color: #ff7777 !important; }
    </style>
</head>
<body>
    <div id="loginSection" class="login-box">
        <h2>歡迎來到社群牆</h2>
        <button id="loginBtn">使用 Google 登入</button>
    </div>

    <div id="appSection" style="display:none;">
        <h3 id="userName"></h3>
        <textarea id="postInput" style="width:100%; height:80px;" placeholder="寫點什麼吧..."></textarea>
        <button id="postBtn">發佈貼文</button>
        <div id="memoList" style="margin-top: 20px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, increment, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnF-e8BYtHKkqMGKLPL6-tCzh9SZHwGIE",
            authDomain: "my-social-app-74cb5.firebaseapp.com",
            projectId: "my-social-app-74cb5",
            storageBucket: "my-social-app-74cb5.firebasestorage.app",
            messagingSenderId: "296934453383",
            appId: "1:296934453383:web:c5135ba3c923e20c788822"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("appSection").style.display = "block";
                document.getElementById("userName").innerText = `你好, ${user.displayName}`;
                loadPosts();
            } else {
                document.getElementById("loginSection").style.display = "block";
                document.getElementById("appSection").style.display = "none";
            }
        });

        document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);

        document.getElementById("postBtn").onclick = async () => {
            const text = document.getElementById("postInput").value;
            if (!text.trim()) return;
            await addDoc(collection(db, "memos"), { 
                content: text, 
                name: auth.currentUser.displayName, 
                uid: auth.currentUser.uid, 
                timestamp: new Date(), 
                likes: 0 
            });
            document.getElementById("postInput").value = "";
        };

        function loadPosts() {
            onSnapshot(query(collection(db, "memos"), orderBy("timestamp", "desc")), (snapshot) => {
                const list = document.getElementById("memoList");
                list.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const div = document.createElement("div");
                    div.className = "post";
                    const isOwner = auth.currentUser && auth.currentUser.uid === data.uid;
                    
                    div.innerHTML = `
                        <strong>${data.name}</strong>
                        <p>${data.content}</p>
                        <button id="like-${docSnap.id}">❤️ ${data.likes || 0}</button>
                        ${isOwner ? `<button id="del-${docSnap.id}" style="background:#ff4444; color:white;">刪除</button>` : ''}
                    `;
                    list.appendChild(div);

                    // 愛心防呆機制
                    const likeBtn = document.getElementById(`like-${docSnap.id}`);
                    likeBtn.onclick = async () => {
                        if (likeBtn.dataset.clicked === "true") return;
                        
                        await updateDoc(doc(db, 'memos', docSnap.id), { likes: increment(1) });
                        
                        likeBtn.dataset.clicked = "true";
                        likeBtn.classList.add('liked');
                        likeBtn.innerText = `❤️ ${data.likes + 1}`;
                    };

                    // 刪除功能
                    if (isOwner) {
                        document.getElementById(`del-${docSnap.id}`).onclick = () => {
                            deleteDoc(doc(db, 'memos', docSnap.id));
                        };
                    }
                });
            });
        }
    </script>
</body>
</html>
