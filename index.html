<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>大家都在看 - 即時動態牆</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        .post { border: 1px solid #eee; padding: 15px; margin: 15px 0; border-radius: 12px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .delete-btn { color: #888; cursor: pointer; font-size: 12px; margin-top: 10px; display: block; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #0095f6; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #007bb5; }
    </style>
</head>
<body>
    <h1>🔥 大家都在看</h1>
    <div>
        <textarea id="postInput" placeholder="現在有什麼熱門話題？跟大家分享吧！"></textarea>
        <button id="postBtn">發佈貼文</button>
    </div>
    <div id="memoList">讀取中...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnF-e8BYtHKkqMGKLPL6-tCzh9SZHwGIE",
            authDomain: "my-social-app-74cb5.firebaseapp.com",
            projectId: "my-social-app-74cb5",
            storageBucket: "my-social-app-74cb5.firebasestorage.app",
            messagingSenderId: "296934453383",
            appId: "1:296934453383:web:c5135ba3c923e20c788822",
            measurementId: "G-0VCRMP00CS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById("postBtn").addEventListener("click", async () => {
            const text = document.getElementById("postInput").value;
            if (!text.trim()) return alert("請輸入內容喔！");
            
            try {
                await addDoc(collection(db, "memos"), { content: text, timestamp: new Date() });
                document.getElementById("postInput").value = "";
                alert("發佈成功！");
                loadMemos();
            } catch (e) {
                console.error("發佈失敗:", e);
                alert("發佈失敗，請稍後再試！");
            }
        });

        async function loadMemos() {
            const memoList = document.getElementById("memoList");
            try {
                const q = query(collection(db, "memos"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                memoList.innerHTML = "";
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const div = document.createElement("div");
                    div.className = "post";
                    div.innerHTML = `<p>${data.content}</p>
                                    <span class="delete-btn" data-id="${docSnap.id}">刪除此則</span>`;
                    memoList.appendChild(div);
                });

                document.querySelectorAll(".delete-btn").forEach(btn => {
                    btn.addEventListener("click", async (e) => {
                        const id = e.target.getAttribute("data-id");
                        await deleteDoc(doc(db, "memos", id));
                        loadMemos();
                    });
                });
            } catch (e) {
                memoList.innerHTML = "讀取失敗，請重新整理試試。";
            }
        }
        loadMemos();
    </script>
</body>
</html>
