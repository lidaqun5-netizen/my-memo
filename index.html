<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>大家都在看 - 即時動態牆</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f0f2f5; }
        h1 { text-align: center; color: #333; }
        .post { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-info { display: flex; align-items: center; margin-bottom: 10px; }
        .avatar { width: 35px; height: 35px; background: #0095f6; border-radius: 50%; margin-right: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .actions { margin-top: 12px; display: flex; gap: 15px; align-items: center; border-top: 1px solid #eee; padding-top: 10px; }
        .like-btn { cursor: pointer; background: none; border: none; font-size: 16px; transition: transform 0.1s; }
        .like-btn:active { transform: scale(1.3); }
        .delete-btn { cursor: pointer; color: #8e8e8e; font-size: 12px; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button#postBtn { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔥 大家都在看</h1>
    <textarea id="postInput" placeholder="現在有什麼熱門話題？跟大家分享吧！"></textarea>
    <button id="postBtn">發佈貼文</button>
    <div id="memoList" style="margin-top: 20px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, increment, doc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnF-e8BYtHKkqMGKLPL6-tCzh9SZHwGIE",
            projectId: "my-social-app-74cb5",
            storageBucket: "my-social-app-74cb5.firebasestorage.app",
            messagingSenderId: "296934453383",
            appId: "1:296934453383:web:c5135ba3c923e20c788822"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 發文功能
        document.getElementById("postBtn").addEventListener("click", async () => {
            const text = document.getElementById("postInput").value;
            const name = prompt("請設定你的暱稱：") || "匿名用戶";
            if (!text.trim()) return alert("請輸入內容！");
            await addDoc(collection(db, "memos"), { content: text, name: name, timestamp: new Date(), likes: 0 });
            document.getElementById("postInput").value = "";
        });

        // 嚴謹的按讚切換邏輯
        window.likePost = async (id) => {
            const docRef = doc(db, "memos", id);
            const isLiked = localStorage.getItem('liked_' + id);
            const docSnap = await getDoc(docRef);
            const currentLikes = docSnap.data().likes || 0;

            if (!isLiked) {
                await updateDoc(docRef, { likes: increment(1) });
                localStorage.setItem('liked_' + id, 'true');
            } else if (currentLikes > 0) {
                await updateDoc(docRef, { likes: increment(-1) });
                localStorage.removeItem('liked_' + id);
            }
        };

        window.deletePost = async (id) => { if(confirm("確定刪除？")) await deleteDoc(doc(db, "memos", id)); };

        // 即時監聽渲染 (加入狀態同步檢查)
        const q = query(collection(db, "memos"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById("memoList");
            list.innerHTML = "";
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const id = docSnap.id;
                // 強制同步：只有在 localStorage 有紀錄且資料庫數值大於 0 時才顯示紅心
                const isLiked = localStorage.getItem('liked_' + id) && (data.likes > 0);
                
                const div = document.createElement("div");
                div.className = "post";
                div.innerHTML = `
                    <div class="user-info">
                        <div class="avatar">${data.name.charAt(0)}</div>
                        <strong>${data.name}</strong>
                    </div>
                    <p style="margin: 10px 0;">${data.content}</p>
                    <div class="actions">
                        <button class="like-btn" onclick="likePost('${id}')">
                            ${isLiked ? '❤️' : '🤍'} ${data.likes || 0}
                        </button>
                        <span class="delete-btn" onclick="deletePost('${id}')">刪除</span>
                    </div>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
