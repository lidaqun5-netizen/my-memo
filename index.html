<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>我的社群牆</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f0f2f5; }
        .post { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .login-box { text-align: center; margin-top: 50px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #0095f6; color: white; }
    </style>
</head>
<body>
    <div id="loginSection" class="login-box">
        <h2>歡迎來到社群牆</h2>
        <button id="loginBtn">使用 Google 登入</button>
    </div>

    <div id="appSection" style="display:none;">
        <h3 id="userName"></h3>
        <textarea id="postInput" placeholder="寫點什麼吧..."></textarea>
        <button id="postBtn">發佈貼文</button>
        <div id="memoList" style="margin-top: 20px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, increment, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnF-e8BYtHKkqMGKLPL6-tCzh9SZHwGIE",
            projectId: "my-social-app-74cb5",
            storageBucket: "my-social-app-74cb5.firebasestorage.app",
            messagingSenderId: "296934453383",
            appId: "1:296934453383:web:c5135ba3c923e20c788822"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("appSection").style.display = "block";
                document.getElementById("userName").innerText = `你好, ${user.displayName}`;
                loadPosts();
            }
        });

        document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);

        // 發文功能
        document.getElementById("postBtn").addEventListener("click", async () => {
            const text = document.getElementById("postInput").value;
            const user = auth.currentUser;
            if (!text.trim()) return;
            await addDoc(collection(db, "memos"), { content: text, name: user.displayName, uid: user.uid, timestamp: new Date(), likes: 0 });
            document.getElementById("postInput").value = "";
        });

        // 讀取貼文
        function loadPosts() {
            onSnapshot(query(collection(db, "memos"), orderBy("timestamp", "desc")), (snapshot) => {
                const list = document.getElementById("memoList");
                list.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const div = document.createElement("div");
                    div.className = "post";
                    div.innerHTML = `
                        <strong>${data.name}</strong>
                        <p>${data.content}</p>
                        <button onclick="updateDoc(doc(db, 'memos', '${docSnap.id}'), {likes: increment(${data.likes > 1 ? -1 : 1})})">
                            ${data.likes > 1 ? '❤️' : '🤍'} ${data.likes}
                        </button>
                        ${auth.currentUser.uid === data.uid ? `<button onclick="deleteDoc(doc(db, 'memos', '${docSnap.id}'))">刪除</button>` : ''}
                    `;
                    list.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
